name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".dockerignore"
      - "lefthook.yml"
      - "biome.json"
      - "mockups/**"
      - "docker-compose.yml"
      - "Dockerfile"
      - ".github/**"
      - ".claude/**"

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: .
      - run: bun run lint
        working-directory: .
      - run: bunx wrangler deploy

  deploy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: .
      - run: bun run lint
        working-directory: .
      - run: bunx vite build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - run: bunx wrangler pages deploy dist --project-name driva-web
